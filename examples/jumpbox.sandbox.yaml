# Minimal "jumpbox" sandbox: a small Linux workspace that owns the Mac.
#
# Its only jobs are (1) to be able to reach the Mac on TCP :22, and (2) to expose
# ~/mac/connection.json (see examples/connection.json). In a real setup you would
# also provision the Mac here (e.g. a Terraform resource) and write connection.json
# from its outputs.
#
# Replace <base-workspace-image> with a Linux workspace base image available to your org
# (it must include `ssh`, `nc`, and `ssh-keygen`).
workspaces:
  - name: gw
    base_snapshot: <base-workspace-image>
    schedule_spec:
      selector:
        name: small
